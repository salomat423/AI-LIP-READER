<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "AI Lip Reader" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="pointer-events-none fixed inset-0 overflow-hidden">
      <div class="absolute -top-24 left-1/2 h-[420px] w-[820px] -translate-x-1/2 rounded-full bg-fuchsia-500/15 blur-3xl"></div>
      <div class="absolute -bottom-24 left-1/3 h-[420px] w-[820px] -translate-x-1/2 rounded-full bg-cyan-500/10 blur-3xl"></div>
    </div>

    <header class="relative z-10 border-b border-white/10 bg-slate-950/40 backdrop-blur">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <a href="{{ url_for('landing') }}" class="flex items-center gap-2">
          <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-fuchsia-500 to-cyan-400"></div>
          <span class="text-sm font-semibold tracking-wide">AI Lip Reader</span>
        </a>
        <nav class="flex items-center gap-2 text-sm">
          <a class="rounded-lg px-3 py-2 text-slate-200/90 hover:bg-white/5 hover:text-white" href="{{ url_for('landing') }}">Home</a>
          {% if username %}
            <a class="rounded-lg px-3 py-2 text-slate-200/90 hover:bg-white/5 hover:text-white" href="{{ url_for('registration') }}">Register (capture)</a>
            <a class="rounded-lg px-3 py-2 text-slate-200/90 hover:bg-white/5 hover:text-white" href="{{ url_for('record_login') }}">Verify</a>
            <a class="rounded-lg px-3 py-2 text-slate-200/90 hover:bg-white/5 hover:text-white" href="{{ url_for('account') }}">Account</a>
            <a class="rounded-lg px-3 py-2 text-slate-200/90 hover:bg-white/5 hover:text-white" href="{{ url_for('logout') }}">Logout</a>
          {% else %}
            <a class="rounded-lg px-3 py-2 text-slate-200/90 hover:bg-white/5 hover:text-white" href="{{ url_for('registration') }}">Register</a>
            <a class="rounded-lg px-3 py-2 text-slate-200/90 hover:bg-white/5 hover:text-white" href="{{ url_for('login') }}">Login</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="relative z-10 mx-auto w-full max-w-6xl px-4 py-10">
      {% block content %}{% endblock %}
    </main>

    <footer class="relative z-10 border-t border-white/10 py-10">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 text-xs text-slate-400">
        <span>Local demo • Webcam required</span>
        <span>Tailwind CDN • Vanilla JS</span>
      </div>
    </footer>
  </body>
</html>
