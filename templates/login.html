{% extends "base.html" %}
{% set title = "Login — AI Lip Reader" %}

{% block content %}
  <div class="mx-auto grid max-w-2xl gap-8">
    <div class="rounded-3xl border border-white/10 bg-white/5 p-8">
      <h2 class="text-2xl font-semibold text-white">Login</h2>
      <p class="mt-2 text-sm text-slate-300">Enter your username + password, then do webcam verification.</p>

      <form class="mt-6 grid gap-4" action="{{ url_for('login_post') }}" method="post" autocomplete="off">
        <div>
          <label class="text-xs text-slate-300">Username</label>
          <input
            name="username"
            required
            class="mt-1 w-full rounded-xl border border-white/10 bg-slate-950/40 px-4 py-3 text-sm text-white outline-none placeholder:text-slate-500 focus:border-cyan-400/60"
            placeholder="your username"
          />
        </div>
        <div>
          <label class="text-xs text-slate-300">Password</label>
          <input
            type="password"
            name="password"
            required
            class="mt-1 w-full rounded-xl border border-white/10 bg-slate-950/40 px-4 py-3 text-sm text-white outline-none placeholder:text-slate-500 focus:border-cyan-400/60"
            placeholder="••••••••"
          />
        </div>
        <button class="mt-2 rounded-xl bg-white px-5 py-3 text-sm font-semibold text-slate-950 hover:bg-slate-100" type="submit">
          Continue to verification →
        </button>
      </form>
    </div>
  </div>
{% endblock %}
